<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Opening LokAhst Wiki...</title>
  </head>
  <body>
    <p>Opening the requested wiki page...</p>
    <script>
      (function () {
        "use strict";
        const route = `${location.pathname}${location.search}${location.hash}`;
        location.replace(`/?__wiki_route=${encodeURIComponent(route)}`);
      })();
    </script>
  </body>
</html>
